<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion - ONPS Mauritanie</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast" class="toast"></div>
<div class="login-page">
  <div class="login-box">
    <div class="logo" style="justify-content:center;margin-bottom:20px;">
      <div class="logo-icon" style="cursor:pointer;" onclick="window.location.href='/'">&#x2695;</div>
      <div class="logo-text">ONPS <span>Mauritanie</span></div>
    </div>
    <h1 data-fr="Connexion" data-ar="تسجيل الدخول">Connexion</h1>
    <p data-fr="Accédez à votre espace" data-ar="الوصول إلى مساحتك الخاصة">Accédez à votre espace</p>
    <button onclick="toggleLang()" style="background:none;border:1px solid #2a3a4a;color:#a0b4c8;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;width:100%;margin-bottom:15px;">&#127760; <span id="langLabel">AR</span></button>
    <form class="login-form" id="loginForm">
      <input type="text" class="form-input" name="username" data-fr-ph="Nom d'utilisateur" data-ar-ph="اسم المستخدم" placeholder="Nom d'utilisateur" required>
      <input type="password" class="form-input" name="password" data-fr-ph="Mot de passe" data-ar-ph="كلمة المرور" placeholder="Mot de passe" required>
      <button type="submit" class="btn btn-primary" style="width:100%;" data-fr="Se connecter" data-ar="تسجيل الدخول">Se connecter</button>
    </form>
    <p style="margin-top:15px;text-align:center;font-size:13px;color:#5a6a7a;">
      <a href="/" data-fr="Retour au site" data-ar="العودة إلى الموقع">Retour au site</a>
    </p>
  </div>
</div>
<script>
let lang = 'fr';
function toggleLang() {
  lang = lang === 'fr' ? 'ar' : 'fr';
  document.getElementById('langLabel').textContent = lang === 'fr' ? 'AR' : 'FR';
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
  document.querySelectorAll('[data-fr]').forEach(el => { el.innerHTML = lang === 'fr' ? el.dataset.fr : el.dataset.ar; });
  document.querySelectorAll('[data-fr-ph]').forEach(el => { el.placeholder = lang === 'fr' ? el.dataset.frPh : el.dataset.arPh; });
  document.title = lang === 'fr' ? 'Connexion - ONPS Mauritanie' : 'تسجيل الدخول - ONPS موريتانيا';
}
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const fd = new FormData(e.target);
  const data = Object.fromEntries(fd);
  try {
    const r = await fetch('/api/login', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
    const d = await r.json();
    if (!r.ok) { showToast(d.error || 'Erreur de connexion', 'error'); return; }
    if (d.user.role === 'admin') window.location.href = '/admin.html';
    else if (d.user.role === 'visitor') window.location.href = '/visiteur.html';
    else window.location.href = '/membre.html';
  } catch(e) { showToast('Erreur de connexion', 'error'); }
});
</script>
</body>
</html>
