<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ONPS Mauritanie</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="toast" class="toast"></div>
<div class="dashboard">
  <div class="sidebar">
    <div class="sidebar-logo">
      <div class="logo">
        <div class="logo-icon">&#x2695;</div>
        <div class="logo-text">ONPS <span>Admin</span></div>
      </div>
    </div>
    <nav>
      <a href="#" onclick="showTab('dashboard')" class="active" data-tab="dashboard">&#x1F4CA; Tableau de bord</a>
      <a href="#" onclick="showTab('membres')" data-tab="membres">&#x1F465; Membres</a>
      <a href="#" onclick="showTab('actualites')" data-tab="actualites">&#x1F4F0; Actualités</a>
      <a href="#" onclick="showTab('inscriptions')" data-tab="inscriptions">&#x1F4DD; Demandes d'inscription</a>
      <a href="#" onclick="showTab('messages')" data-tab="messages">&#x2709; Messages</a>
      <a href="#" onclick="showTab('annuaire')" data-tab="annuaire">&#x1F4CB; Annuaire</a>
      <a href="#" onclick="showTab('parametres')" data-tab="parametres">&#x2699; Paramètres</a>
      <a href="#" onclick="showTab('maintenance')" data-tab="maintenance">&#x1F6A7; Maintenance</a>
      <a href="#" onclick="showTab('visiteurs')" data-tab="visiteurs">&#x1F464; Visiteurs</a>
    </nav>
    <div style="padding:20px;border-top:1px solid #2a3a4a;margin-top:auto;">
      <p style="font-size:12px;color:#5a6a7a;margin-bottom:10px;" id="userInfo"></p>
      <button onclick="logout()" class="btn btn-danger btn-sm" style="width:100%;">Déconnexion</button>
    </div>
  </div>
  <div class="main-content" id="mainContent">
    <!-- Dyn content -->
  </div>
</div>

<script>
let currentLang = 'fr';
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 4000);
}

async function checkAuth() {
  try {
    const r = await fetch('/api/me');
    if (!r.ok) { window.location.href = '/login.html'; return null; }
    const d = await r.json();
    if (d.user.role !== 'admin') { window.location.href = '/membre.html'; return null; }
    document.getElementById('userInfo').textContent = d.user.name + ' (Admin)';
    return d.user;
  } catch(e) { window.location.href = '/login.html'; return null; }
}

async function logout() {
  await fetch('/api/logout', { method:'POST' });
  window.location.href = '/login.html';
}

function showTab(name) {
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  switch(name) {
    case 'dashboard': loadDashboard(); break;
    case 'membres': loadMembres(); break;
    case 'actualites': loadActualitesAdmin(); break;
    case 'inscriptions': loadInscriptions(); break;
    case 'messages': loadMessages(); break;
    case 'annuaire': loadAnnuaireAdmin(); break;
    case 'parametres': loadParametres(); break;
    case 'maintenance': loadMaintenance(); break;
    case 'visiteurs': loadVisiteurs(); break;
  }
}

// Dashboard
async function loadDashboard() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<h2>Tableau de bord</h2><div id="statsCards" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin:20px 0;"></div><div id="quickActions"></div>';
  try {
    const r = await fetch('/api/stats');
    const s = await r.json();
    document.getElementById('statsCards').innerHTML = `
      <div class="card"><div class="card-icon">&#x1F465;</div><h3>${s.totalMembres}</h3><p>Membres</p></div>
      <div class="card"><div class="card-icon" style="background:rgba(46,204,113,0.15);">&#x2705;</div><h3>${s.membresValides}</h3><p>Membres valides</p></div>
      <div class="card"><div class="card-icon" style="background:rgba(241,196,15,0.15);">&#x23F3;</div><h3>${s.membresEnAttente}</h3><p>En attente</p></div>
      <div class="card"><div class="card-icon" style="background:rgba(52,152,219,0.15);">&#x1F4F0;</div><h3>${s.totalActualites}</h3><p>Actualités</p></div>
      <div class="card"><div class="card-icon" style="background:rgba(155,89,182,0.15);">&#x1F4DD;</div><h3>${s.totalInscriptions}</h3><p>Inscriptions</p></div>
      <div class="card"><div class="card-icon" style="background:rgba(231,76,60,0.15);">&#x2709;</div><h3>${s.messagesNonLus}</h3><p>Messages non lus</p></div>
    `;
    document.getElementById('quickActions').innerHTML = `
      <h3 style="margin:30px 0 15px;">Actions rapides</h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="showTab('inscriptions')">Voir les inscriptions</button>
        <button class="btn btn-outline" onclick="showTab('messages')">Messages (${s.messagesNonLus} non lus)</button>
        <button class="btn btn-outline" onclick="showTab('membres')">Gérer les membres</button>
      </div>`;
  } catch(e) { mc.innerHTML += '<p>Erreur chargement stats</p>'; }
}

// Membres
async function loadMembres() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="page-header"><h2>Gestion des membres</h2><button class="btn btn-primary" onclick="showMembreModal()">+ Nouveau membre</button></div><div style="overflow-x:auto;"><table><thead><tr><th>Nom</th><th>Profession</th><th>Spécialité</th><th>N° Ordre</th><th>Email</th><th>Téléphone</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="membresBody"></tbody></table></div><div class="modal" id="membreModal"><div class="modal-content"><h3>Nouveau membre</h3><form class="modal-form" id="membreForm"><input type="hidden" name="id"><input type="text" class="form-input" name="name" placeholder="Nom complet" required><input type="text" class="form-input" name="username" placeholder="Nom d'utilisateur" required><input type="email" class="form-input" name="email" placeholder="Email" required><input type="text" class="form-input" name="phone" placeholder="Téléphone"><select class="form-input" name="profession" required><option value="">Profession</option><option>Médecin</option><option>Pharmacien</option><option>Infirmier</option><option>Chirurgien-dentiste</option><option>Sage-femme</option></select><input type="text" class="form-input" name="specialite" placeholder="Spécialité"><input type="text" class="form-input" name="numero_ordre" placeholder="N° Ordre"><input type="password" class="form-input" name="password" placeholder="Mot de passe (défaut: user)"><button type="submit" class="btn btn-primary">Enregistrer</button><button type="button" class="btn btn-outline" onclick="document.getElementById('membreModal').classList.remove('active')">Annuler</button></form></div></div>`;
  try {
    const r = await fetch('/api/membres');
    const d = await r.json();
    document.getElementById('membresBody').innerHTML = d.membres.map(m => `<tr>
      <td>${m.name}</td><td>${m.profession||'-'}</td><td>${m.specialite||'-'}</td><td>${m.numero_ordre||'-'}</td><td>${m.email||'-'}</td><td>${m.phone||'-'}</td>
      <td><span class="badge ${m.statut==='valide'?'badge-success':m.statut==='en_attente'?'badge-warning':'badge-danger'}">${m.statut}</span></td>
      <td><button class="btn btn-sm btn-primary" onclick="setStatut(${m.id},'valide')">Valider</button> <button class="btn btn-sm btn-outline" onclick="setStatut(${m.id},'suspendu')">Suspendre</button> <button class="btn btn-sm btn-danger" onclick="deleteMembre(${m.id})">Suppr.</button></td>
    </tr>`).join('');
  } catch(e) { showToast('Erreur chargement', 'error'); }

  document.getElementById('membreForm').addEventListener('submit', async (e) => {
    e.preventDefault(); const fd = new FormData(e.target); const data = Object.fromEntries(fd);
    try {
      const r = await fetch('/api/membres', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      if (!r.ok) { const ed = await r.json(); showToast(ed.error||'Erreur', 'error'); return; }
      showToast('Membre créé', 'success'); document.getElementById('membreModal').classList.remove('active'); loadMembres();
    } catch(e) { showToast('Erreur', 'error'); }
  });
}
function showMembreModal() { document.getElementById('membreModal').classList.add('active'); }
async function setStatut(id, statut) {
  try { await fetch('/api/membres/'+id+'/statut', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({statut}) }); showToast('Statut mis à jour', 'success'); loadMembres(); } catch(e) {}
}
async function deleteMembre(id) {
  if (!confirm('Supprimer ce membre ?')) return;
  try { await fetch('/api/membres/'+id, { method:'DELETE' }); showToast('Supprimé', 'success'); loadMembres(); } catch(e) {}
}

// Actualites
async function loadActualitesAdmin() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="page-header"><h2>Actualités</h2><button class="btn btn-primary" onclick="showActuModal()">+ Nouvelle</button></div><div id="actualitesAdminList"></div><div class="modal" id="actuModal"><div class="modal-content"><h3>Actualité</h3><form class="modal-form" id="actuForm"><input type="hidden" name="id"><input type="text" class="form-input" name="titre_fr" placeholder="Titre (FR)" required><input type="text" class="form-input" name="titre_ar" placeholder="Titre (AR)" required><textarea class="form-input" name="contenu_fr" placeholder="Contenu (FR)" required></textarea><textarea class="form-input" name="contenu_ar" placeholder="Contenu (AR)" required></textarea><input type="date" class="form-input" name="date" required><select class="form-input" name="statut"><option value="publie">Publié</option><option value="brouillon">Brouillon</option></select><button type="submit" class="btn btn-primary">Enregistrer</button><button type="button" class="btn btn-outline" onclick="document.getElementById('actuModal').classList.remove('active')">Annuler</button></form></div></div>`;
  try {
    const r = await fetch('/api/actualites');
    const d = await r.json();
    document.getElementById('actualitesAdminList').innerHTML = d.actualites.map(a => `<div class="actu-card"><h3>${a.titre_fr}</h3><div class="date">${a.date} <span class="badge ${a.statut==='publie'?'badge-success':'badge-warning'}">${a.statut}</span></div><p>${a.contenu_fr}</p><div style="margin-top:10px;display:flex;gap:10px;"><button class="btn btn-sm btn-danger" onclick="deleteActu(${a.id})">Supprimer</button></div></div>`).join('');
  } catch(e) {}
  document.getElementById('actuForm').addEventListener('submit', async (e) => {
    e.preventDefault(); const fd = new FormData(e.target); const data = Object.fromEntries(fd);
    try {
      const r = await fetch('/api/actualites', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      if (!r.ok) return; showToast('Actualité créée', 'success'); document.getElementById('actuModal').classList.remove('active'); loadActualitesAdmin();
    } catch(e) {}
  });
}
function showActuModal() { document.getElementById('actuModal').classList.add('active'); }
async function deleteActu(id) {
  if (!confirm('Supprimer ?')) return;
  try { await fetch('/api/actualites/'+id, { method:'DELETE' }); showToast('Supprimée', 'success'); loadActualitesAdmin(); } catch(e) {}
}

// Inscriptions
async function loadInscriptions() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<h2>Demandes d\'inscription</h2><div style="overflow-x:auto;"><table><thead><tr><th>Nom</th><th>Profession</th><th>Spécialité</th><th>Email</th><th>Téléphone</th><th>Diplôme</th><th>Exp.</th><th>Date</th><th>Actions</th></tr></thead><tbody id="inscriptionsBody"></tbody></table></div>';
  try {
    const r = await fetch('/api/inscriptions');
    const d = await r.json();
    document.getElementById('inscriptionsBody').innerHTML = (d.inscriptions.length ? d.inscriptions : []).map(i => `<tr>
      <td>${i.nom}</td><td>${i.profession}</td><td>${i.specialite||'-'}</td><td>${i.email}</td><td>${i.telephone}</td><td>${i.diplome}</td><td>${i.annee_experience} ans</td>
      <td>${i.createdAt ? new Date(i.createdAt).toLocaleDateString() : '-'}</td>
      <td><button class="btn btn-sm btn-danger" onclick="delInscription(${i.id})">Suppr.</button></td>
    </tr>`).join('');
  } catch(e) {}
}
async function delInscription(id) {
  if (!confirm('Supprimer ?')) return;
  try { await fetch('/api/inscriptions/'+id, { method:'DELETE' }); showToast('Supprimée', 'success'); loadInscriptions(); } catch(e) {}
}

// Messages
async function loadMessages() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = '<h2>Messages</h2><div style="overflow-x:auto;"><table><thead><tr><th>Nom</th><th>Email</th><th>Sujet</th><th>Message</th><th>Date</th><th>Actions</th></tr></thead><tbody id="messagesBody"></tbody></table></div>';
  try {
    const r = await fetch('/api/messages');
    const d = await r.json();
    document.getElementById('messagesBody').innerHTML = (d.messages.length ? d.messages : []).map(m => `<tr style="${m.lu?'':'font-weight:bold;background:rgba(46,204,113,0.03)'}">
      <td>${m.nom}</td><td>${m.email}</td><td>${m.sujet}</td><td style="max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${m.message}</td>
      <td>${m.createdAt ? new Date(m.createdAt).toLocaleDateString() : '-'}</td>
      <td>${!m.lu ? `<button class="btn btn-sm btn-primary" onclick="markLu(${m.id})">Marquer lu</button> ` : ''}<button class="btn btn-sm btn-danger" onclick="delMsg(${m.id})">Suppr.</button></td>
    </tr>`).join('');
  } catch(e) {}
}
async function markLu(id) {
  try { await fetch('/api/messages/'+id+'/lu', { method:'PUT' }); showToast('Marqué lu', 'success'); loadMessages(); } catch(e) {}
}
async function delMsg(id) {
  if (!confirm('Supprimer ?')) return;
  try { await fetch('/api/messages/'+id, { method:'DELETE' }); showToast('Supprimé', 'success'); loadMessages(); } catch(e) {}
}

  } catch(e) {}
}

    document.getElementById('p_footer_text_ar').value = s.footer_text_ar || '';
    if (s.logo_base64) {
      document.getElementById('logoPreview').innerHTML = '<img src="' + s.logo_base64 + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">';
    }
  } catch(e) { showToast('Erreur chargement paramètres', 'error'); }

  document.getElementById('logoInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
      document.getElementById('logoPreview').innerHTML = '<img src="' + ev.target.result + '" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">';
    };
    reader.readAsDataURL(file);
  });
}

// Maintenance
async function loadMaintenance() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="page-header"><h2>Mode Maintenance</h2></div>
    <div style="max-width:600px;">
      <div class="card" style="margin-bottom:20px;">
        <h3 id="maintenanceStatus" style="margin-bottom:15px;">Chargement...</h3>
        <button class="btn btn-primary" id="maintenanceToggleBtn" onclick="toggleMaintenance()">Activer/Désactiver</button>
      </div>
      <h3 style="margin:20px 0 10px;color:#2ecc71;">Message de maintenance</h3>
      <div class="form-group"><label>Message (FR)</label><textarea class="form-input" id="maint_msg_fr" rows="2">Site en maintenance. Veuillez revenir plus tard.</textarea></div>
      <div class="form-group"><label>Message (AR)</label><textarea class="form-input" id="maint_msg_ar" rows="2">الموقع قيد الصيانة. يرجى العودة لاحقًا.</textarea></div>
      <button class="btn btn-primary" onclick="saveMaintenanceMsg()" style="margin-top:10px;">Enregistrer message</button>
    </div>
    <h3 style="margin:30px 0 15px;color:#2ecc71;">Visibilité des onglets</h3>
    <p style="color:#a0b4c8;margin-bottom:15px;">Activez ou désactivez les sections visibles sur le site public.</p>
    <div id="tabsToggle"></div>`;

  try {
    const r = await fetch('/api/settings');
    const d = await r.json();
    const s = d.settings || {};
    const isOn = s.maintenance_mode;
    const statusEl = document.getElementById('maintenanceStatus');
    statusEl.innerHTML = isOn ? '&#x1F6A7; Maintenance <span class="badge badge-danger">ACTIVÉE</span>' : '&#x2705; Site en ligne <span class="badge badge-success">NORMAL</span>';
    document.getElementById('maintenanceToggleBtn').textContent = isOn ? 'Désactiver la maintenance' : 'Activer la maintenance';
    document.getElementById('maint_msg_fr').value = s.maintenance_message_fr || 'Site en maintenance. Veuillez revenir plus tard.';
    document.getElementById('maint_msg_ar').value = s.maintenance_message_ar || 'الموقع قيد الصيانة. يرجى العودة لاحقًا.';

    // Tabs visibility
    const tabs = { accueil:'Accueil', apropos:'À propos', annuaire:'Annuaire', actualites:'Actualités', inscription:'Inscription', contact:'Contact' };
    const vis = s.tabs_visibility || {};
    const tabsDiv = document.getElementById('tabsToggle');
    tabsDiv.innerHTML = '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;">' +
      Object.entries(tabs).map(([key, label]) => `
        <div class="card" style="display:flex;align-items:center;justify-content:space-between;padding:15px 20px;cursor:pointer;" onclick="toggleTab('${key}')">
          <span>${label}</span>
          <span class="badge ${vis[key] !== false ? 'badge-success' : 'badge-danger'}" id="tabBadge_${key}">${vis[key] !== false ? 'Visible' : 'Masqué'}</span>
        </div>`).join('') + '</div>';
  } catch(e) { showToast('Erreur', 'error'); }
}

async function toggleMaintenance() {
  const statusEl = document.getElementById('maintenanceStatus');
  const isOn = statusEl.innerHTML.includes('ACTIVÉE');
  try {
    const r = await fetch('/api/settings/maintenance', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ maintenance_mode: !isOn }) });
    if (!r.ok) throw Error();
    showToast(isOn ? 'Maintenance désactivée' : 'Maintenance activée', 'success');
    loadMaintenance();
  } catch(e) { showToast('Erreur', 'error'); }
}

async function saveMaintenanceMsg() {
  try {
    const r = await fetch('/api/settings/maintenance', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({
      maintenance_message_fr: document.getElementById('maint_msg_fr').value,
      maintenance_message_ar: document.getElementById('maint_msg_ar').value
    }) });
    if (!r.ok) throw Error();
    showToast('Message enregistré', 'success');
  } catch(e) { showToast('Erreur', 'error'); }
}

async function toggleTab(tabKey) {
  const badge = document.getElementById('tabBadge_' + tabKey);
  const isVis = badge.textContent === 'Visible';
  try {
    const r = await fetch('/api/settings/tabs', { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ [tabKey]: !isVis }) });
    if (!r.ok) throw Error();
    showToast('Onglet ' + (isVis ? 'masqué' : 'visible'), 'success');
    loadMaintenance();
  } catch(e) { showToast('Erreur', 'error'); }
}

// Visiteurs
async function loadVisiteurs() {
  const mc = document.getElementById('mainContent');
  mc.innerHTML = `<div class="page-header"><h2>Gestion des visiteurs</h2><button class="btn btn-primary" onclick="showVisiteurModal()">+ Nouveau visiteur</button></div>
    <p style="color:#a0b4c8;margin-bottom:15px;">Créez des comptes visiteurs pour permettre l'accès au portail ONPS.</p>
    <div style="overflow-x:auto;"><table><thead><tr><th>Nom</th><th>Nom d'utilisateur</th><th>Mot de passe</th><th>Date création</th><th>Statut</th><th>Actions</th></tr></thead><tbody id="visiteursBody"></tbody></table></div>
    <div class="modal" id="visiteurModal"><div class="modal-content"><h3>Nouveau visiteur</h3><form class="modal-form" id="visiteurForm">
      <input type="text" class="form-input" name="name" placeholder="Nom complet" required>
      <input type="text" class="form-input" name="username" placeholder="Nom d'utilisateur" required>
      <input type="text" class="form-input" name="password" placeholder="Mot de passe" required>
      <button type="submit" class="btn btn-primary">Créer le visiteur</button>
      <button type="button" class="btn btn-outline" onclick="document.getElementById('visiteurModal').classList.remove('active')">Annuler</button>
    </form></div></div>`;

  try {
    const r = await fetch('/api/visiteurs');
    const d = await r.json();
    const tbody = document.getElementById('visiteursBody');
    tbody.innerHTML = d.visiteurs.map(v => `<tr>
      <td>${v.name}</td><td>${v.username}</td>
      <td><span style="color:#5a6a7a;">••••••••</span> <button class="btn btn-sm btn-outline" onclick="resetVisiteurPass(${v.id})">Réinit.</button></td>
      <td>${v.createdAt ? new Date(v.createdAt).toLocaleDateString() : '-'}</td>
      <td><span class="badge ${v.actif ? 'badge-success' : 'badge-danger'}">${v.actif ? 'Actif' : 'Désactivé'}</span></td>
      <td>
        <button class="btn btn-sm ${v.actif ? 'btn-outline' : 'btn-primary'}" onclick="toggleVisiteur(${v.id}, ${!v.actif})">${v.actif ? 'Désactiver' : 'Activer'}</button>
        <button class="btn btn-sm btn-danger" onclick="deleteVisiteur(${v.id})">Suppr.</button>
      </td>
    </tr>`).join('');
  } catch(e) { showToast('Erreur chargement', 'error'); }

  document.getElementById('visiteurForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const data = Object.fromEntries(fd);
    try {
      const r = await fetch('/api/visiteurs', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
      if (!r.ok) { const ed = await r.json(); showToast(ed.error||'Erreur', 'error'); return; }
      showToast('Visiteur créé', 'success'); document.getElementById('visiteurModal').classList.remove('active'); loadVisiteurs();
    } catch(e) { showToast('Erreur', 'error'); }
  });
}
function showVisiteurModal() { document.getElementById('visiteurModal').classList.add('active'); }
async function toggleVisiteur(id, actif) {
  try { await fetch('/api/visiteurs/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({actif}) }); showToast('Statut modifié', 'success'); loadVisiteurs(); } catch(e) {}
}
async function resetVisiteurPass(id) {
  const pass = prompt('Nouveau mot de passe :');
  if (!pass) return;
  try { await fetch('/api/visiteurs/'+id, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({password: pass}) }); showToast('Mot de passe réinitialisé', 'success'); } catch(e) {}
}
async function deleteVisiteur(id) {
  if (!confirm('Supprimer ce visiteur ?')) return;
  try { await fetch('/api/visiteurs/'+id, { method:'DELETE' }); showToast('Supprimé', 'success'); loadVisiteurs(); } catch(e) {}
}

checkAuth().then(user => { if (user) loadDashboard(); });
